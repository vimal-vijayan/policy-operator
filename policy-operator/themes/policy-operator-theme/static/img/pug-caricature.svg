<svg viewBox="0 0 300 460" xmlns="http://www.w3.org/2000/svg" width="300" height="460">

  <!-- Small folded button ears (dark brown) -->
  <ellipse cx="58" cy="148" rx="44" ry="30" fill="#3D2010" transform="rotate(-20 58 148)"/>
  <ellipse cx="242" cy="148" rx="44" ry="30" fill="#3D2010" transform="rotate(20 242 148)"/>
  <!-- Inner ear lighter tone -->
  <ellipse cx="60" cy="152" rx="30" ry="20" fill="#5A3218" transform="rotate(-20 60 152)"/>
  <ellipse cx="240" cy="152" rx="30" ry="20" fill="#5A3218" transform="rotate(20 240 152)"/>

  <!-- Main head - warm fawn/beige -->
  <ellipse cx="150" cy="205" rx="132" ry="118" fill="#E8C88A"/>

  <!-- Forehead wrinkle folds -->
  <path d="M88 118 Q150 100 212 118" fill="none" stroke="#C8A060" stroke-width="6" stroke-linecap="round"/>
  <path d="M94 138 Q150 122 206 138" fill="none" stroke="#C8A060" stroke-width="4.5" stroke-linecap="round"/>
  <path d="M100 156 Q150 142 200 156" fill="none" stroke="#C8A060" stroke-width="3" stroke-linecap="round"/>

  <!-- Dark mask — covers eye sockets and flows down to muzzle -->
  <!-- Upper mask (eye band) -->
  <path d="M50 178 Q68 148 105 152 Q150 158 195 152 Q232 148 250 178 Q240 210 195 208 Q150 212 105 208 Q60 210 50 178Z" fill="#3D2010"/>

  <!-- Muzzle (round, dark, prominent) -->
  <ellipse cx="150" cy="258" rx="68" ry="58" fill="#3D2010"/>
  <!-- Muzzle lighter surface -->
  <ellipse cx="150" cy="264" rx="54" ry="45" fill="#5A3218"/>

  <!-- Cheeks (fawn, visible between mask and muzzle edge) -->
  <ellipse cx="74" cy="230" rx="26" ry="20" fill="#E8C88A"/>
  <ellipse cx="226" cy="230" rx="26" ry="20" fill="#E8C88A"/>

  <!-- Eyes — large round cartoon eyes -->
  <circle cx="105" cy="178" r="32" fill="white" stroke="#2D1008" stroke-width="2.5"/>
  <circle cx="195" cy="178" r="32" fill="white" stroke="#2D1008" stroke-width="2.5"/>
  <!-- Iris (warm brown) -->
  <circle cx="110" cy="181" r="22" fill="#7A4210"/>
  <circle cx="200" cy="181" r="22" fill="#7A4210"/>
  <!-- Pupil -->
  <circle cx="110" cy="181" r="13" fill="#0d0500"/>
  <circle cx="200" cy="181" r="13" fill="#0d0500"/>
  <!-- Main catchlight -->
  <circle cx="120" cy="168" r="8" fill="white" opacity="0.92"/>
  <circle cx="210" cy="168" r="8" fill="white" opacity="0.92"/>
  <!-- Small secondary catchlight -->
  <circle cx="103" cy="184" r="4" fill="white" opacity="0.55"/>
  <circle cx="193" cy="184" r="4" fill="white" opacity="0.55"/>

  <!-- Nose (very flat, wide) -->
  <ellipse cx="150" cy="243" rx="30" ry="19" fill="#100800"/>
  <!-- Nostrils -->
  <ellipse cx="135" cy="249" rx="8" ry="6" fill="#080400"/>
  <ellipse cx="165" cy="249" rx="8" ry="6" fill="#080400"/>
  <!-- Nose bridge fold -->
  <path d="M133 233 Q150 228 167 233" fill="none" stroke="#080400" stroke-width="4" stroke-linecap="round"/>
  <!-- Nose highlight -->
  <ellipse cx="143" cy="237" rx="6" ry="3.5" fill="#4a3020" opacity="0.5"/>

  <!-- Freckle dots on muzzle -->
  <circle cx="120" cy="268" r="3" fill="#2D1008"/>
  <circle cx="132" cy="276" r="3" fill="#2D1008"/>
  <circle cx="145" cy="280" r="3" fill="#2D1008"/>
  <circle cx="158" cy="280" r="3" fill="#2D1008"/>
  <circle cx="171" cy="276" r="3" fill="#2D1008"/>
  <circle cx="180" cy="268" r="3" fill="#2D1008"/>
  <circle cx="126" cy="256" r="2.5" fill="#2D1008"/>
  <circle cx="174" cy="256" r="2.5" fill="#2D1008"/>

  <!-- Open smiling mouth -->
  <path d="M104 290 Q150 322 196 290" fill="#2D1008"/>
  <!-- Inner mouth dark -->
  <path d="M108 292 Q150 320 192 292 Q190 308 150 318 Q110 308 108 292Z" fill="#100500"/>
  <!-- Teeth (top, just two visible) -->
  <rect x="132" y="291" width="18" height="10" rx="3" fill="white"/>
  <rect x="152" y="291" width="18" height="10" rx="3" fill="white"/>

  <!-- Tongue — large, hanging out -->
  <path d="M118 306 Q150 338 182 306" fill="#EE7890"/>
  <ellipse cx="150" cy="326" rx="30" ry="20" fill="#EE7890"/>
  <!-- Tongue center groove -->
  <path d="M150 306 L150 344" fill="none" stroke="#D05878" stroke-width="3" stroke-linecap="round"/>
  <!-- Tongue highlight -->
  <ellipse cx="140" cy="316" rx="6" ry="9" fill="#F498AA" opacity="0.5"/>

  <!-- Neck / body stub (round, stocky) -->
  <ellipse cx="150" cy="398" rx="118" ry="72" fill="#E8C88A"/>
  <!-- Chest lighter area -->
  <ellipse cx="150" cy="410" rx="60" ry="42" fill="#F4DCA8"/>

</svg>
