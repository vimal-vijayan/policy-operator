<nav class="navbar" role="navigation" aria-label="Main navigation">
  <div class="container navbar-inner">

    <a class="navbar-brand" href="{{ .Site.Params.githubURL }}" target="_blank" rel="noopener noreferrer">
      <img src="{{ "img/logo.svg" | relURL }}" alt="{{ .Site.Title }} logo" class="navbar-logo">
      <span>{{ .Site.Title }}</span>
    </a>

    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode" title="Toggle dark mode">
      <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </button>

    <button class="navbar-toggle" id="navbar-toggle"
            aria-controls="navbar-menu" aria-expanded="false" aria-label="Toggle navigation">
      <span></span><span></span><span></span>
    </button>

    <div class="navbar-menu" id="navbar-menu" role="menubar">
      {{ range .Site.Menus.main }}
        {{ $external := hasPrefix .URL "http" }}
        {{ $isGitHub := eq .Name "GitHub" }}
        <a class="navbar-link{{ if $.IsMenuCurrent "main" . }} active{{ end }}{{ if $external }} external{{ end }}{{ if $isGitHub }} navbar-link--github{{ end }}"
           href="{{ .URL }}"
           {{ if $external }}target="_blank" rel="noopener noreferrer"{{ end }}
           {{ if $isGitHub }}aria-label="GitHub"{{ end }}
           role="menuitem">
          {{ if $isGitHub }}<svg viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" width="18" height="18" style="vertical-align:-3px"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.66 7.66 0 0 1 2-.27c.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>{{ else }}{{ .Name }}{{ end }}
        </a>
      {{ end }}
    </div>

  </div>
</nav>
