name: CI

on:
  push:
    branches:
      - "feat/**"
  pull_request:
    branches:
      - "main"
      - "feat/**"

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    env:
      IMG: policy-controller:ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: make fmt

      - name: Lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Build
        run: make build

      - name: Docker build
        run: make docker-build IMG=${IMG}

      - name: Docker scan
        uses: docker/scout-action@v1
        with:
          command: quickview
          image: local://${{ env.IMG }}