name: CI

on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "README.md"
      - ".github/workflows/*"
      - "azurepipelines/*"
      - "config/samples/*"
      - "docs/*"
      - "argocd/*"
  pull_request:
    branches:
      - "main"
    paths-ignore:
      - "README.md"
      - ".github/workflows/*"

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    env:
      IMG: policy-controller:ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Format check
        run: make fmt

      - name: Lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Build
        run: make build

      - name: Docker build
        run: make docker-build IMG=${IMG}

      - name: Docker scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ env.IMG }}
          format: table
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH