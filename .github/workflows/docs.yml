name: Deploy Hugo Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - "policy-operator/**"
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Hugo Site
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: "0.147.0"
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup GitHub Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Get latest release version
        id: version
        run: echo "tag=$(git describe --tags --abbrev=0 2>/dev/null || echo 'v0.0.0')" >> "$GITHUB_OUTPUT"

      - name: Build
        working-directory: policy-operator
        env:
          HUGO_PARAMS_VERSION: ${{ steps.version.outputs.tag }}
        run: hugo --minify --baseURL "https://vimal-vijayan.github.io/policy-operator/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: policy-operator/public

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
